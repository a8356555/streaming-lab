# Single-node local stack (SPEC hard constraint: no cloud, all local).
# Host ports use the 19xxx range to avoid colliding with a sibling s3-lsm stack.
name: streaming-lab

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --set
      - redpanda.auto_create_topics_enabled=false
      - --check=false
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda-console:
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "18080:8080"
    depends_on:
      - redpanda

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/open-networks.xml:ro
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19100:9000"
      - "19101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  createbucket:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lakehouse &&
      echo 'bucket lakehouse ready'
      "

  app:
    build: .
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      ORDERS_TOPIC: orders
      ORDERS_PARTITIONS: "4"
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_DATABASE: lake
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      LAKE_BUCKET: lakehouse
      CATALOG_URI: sqlite:////data/catalog.db
      GROUND_TRUTH_PATH: /data/ground_truth.jsonl
    volumes:
      - .:/app
      - app_data:/data
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["sleep", "infinity"]

volumes:
  minio_data:
  app_data:
